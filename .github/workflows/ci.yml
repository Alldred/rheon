# CI: build and run rheon cocotb testbench. Default: Verilator, smoke test (no ELF).
# To run with an ELF, add a job that installs a RISC-V toolchain and runs
# scripts/rheon_gen then scripts/rheon_sim (or check in a minimal tests/data/*.elf).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Verilator
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator

      - name: Configure git URL rewrites for GitHub deps
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          # Use GH_TOKEN (PAT with repo access) when provided; otherwise use
          # the workflow-scoped GITHUB_TOKEN.
          TOKEN="${GH_TOKEN:-$GITHUB_TOKEN}"
          AUTH_URL="https://x-access-token:${TOKEN}@github.com/"

          # Force all common GitHub SSH forms to HTTPS so pip/uv can resolve
          # git dependencies without SSH keys.
          git config --global --add url."${AUTH_URL}".insteadOf "ssh://git@github.com/"
          git config --global --add url."${AUTH_URL}".insteadOf "git@github.com:"
          git config --global --add url."${AUTH_URL}".insteadOf "ssh://github.com/"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run simulation (smoke, no ELF)
        run: make run
        env:
          SIM: verilator
          FAIL_FAST: yes
