# CI: build and run rheon cocotb testbench. Default: Verilator, smoke test (no ELF).
# To run with an ELF, add a job that installs a RISC-V toolchain and runs
# scripts/rheon_gen then scripts/rheon_sim (or check in a minimal tests/data/*.elf).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Verilator
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator

      - name: Configure git for private GitHub deps
        run: |
          # Use GH_TOKEN (PAT with repo access) or fall back to GITHUB_TOKEN.
          # For cross-org deps (e.g. Intuity/forastero) add repo secret GH_TOKEN.
          TOKEN="${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}"
          git config --global url."https://${TOKEN}@github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://${TOKEN}@github.com/".insteadOf "git@github.com:"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run simulation (smoke, no ELF)
        run: make run
        env:
          SIM: verilator
          FAIL_FAST: yes
