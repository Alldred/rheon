# Example regression configuration for ./bin/rheon_regr --file examples/regression.example.yaml
version: 1
regression:
  seed: 1
  jobs: 7
  update: 2
  stages: [run]
  # output_dir defaults to runs/regressions/<timestamp> when omitted
  # output_dir: runs/regressions/nightly
  # resume supports an explicit directory or 'latest'
  # resume: latest
  verbosity: info
  waves: false
  coverage: false
  # timeout_sec: 120
  # fail_fast: true
  # max_failures: 10
  # inject_fail_every: 3
  # inject_fail_message_groups: 4
  # report_json: runs/regressions/nightly_report.json
  tests:
    - name: simple
      count: 100
    - name: branch
      count: 25
