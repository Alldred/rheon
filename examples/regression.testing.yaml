# Testing preset: mixed pass/fail runs with longer per-job execution.
#
# Goal:
# - Jobs typically take ~30-60s on a dev machine.
# - Some jobs pass and some fail (timeout) for UI/regression-status testing.
#
# Notes:
# - This uses deterministic failure injection (inject_fail_every) so pass/fail mix is stable.
# - inject_fail_message_groups controls how many distinct synthetic fail triage groups appear.
# - timeout_sec keeps runs in the ~30-60s/job range on typical dev machines.
# - Keep fail_fast disabled so both passed and failed jobs accumulate.
# - If jobs are too fast on your machine, lower timeout_sec slightly.
version: 1
regression:
  seed: 42
  jobs: 4
  update: 2
  stages: [run]
  verbosity: info
  waves: true
  coverage: true
  timeout_sec: 45
  fail_fast: false
  max_failures: 12
  inject_fail_every: 3
  inject_fail_message_groups: 4
  tests:
    - name: simple
      count: 8
    - name: branch
      count: 8
    - name: ldst
      count: 8
